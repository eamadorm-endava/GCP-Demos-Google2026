<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Endava | Demo Gallery</title>

  <!-- Mobile App Capabilities -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF5640">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=2">
  <link rel="shortcut icon" href="./favicon.ico?v=2">
  <link rel="apple-touch-icon" href="./favicon.ico?v=2">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            endava: {
              orange: '#FF5640',
              dark: '#192B37',
              blue: {
                90: '#30404B',
                80: '#47555F',
                70: '#5E6A73',
                60: '#758087',
                50: '#8C959B',
                40: '#A3AAAF',
                30: '#BABFC3',
                20: '#D1D5D7',
                10: '#E8EAEB',
              }
            }
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background-color: #192B37;
    }

    #root {
      height: 100%;
      overflow: hidden;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 86, 64, 0.3);
      border-radius: 10px;
    }

    button:active {
      opacity: 0.8;
      transform: scale(0.97);
    }

    .endava-gradient {
      background: linear-gradient(135deg, #FF5640 0%, #d13f2d 100%);
    }

    .endava-text-gradient {
      background: linear-gradient(135deg, #FF5640 0%, #ff8c7a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "zustand": "https://esm.sh/zustand@^5.0.9",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
  <link rel="stylesheet" href="./index.css">
</head>

<body class="bg-endava-dark text-white">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
